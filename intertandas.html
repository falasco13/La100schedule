function getColorForCat(cat) {

  if (!colorMap[cat]) { colorMap[cat] = PALETA[Object.keys(colorMap).length % PALETA.length]; }
  return colorMap[cat];
}

  {h:14, p:"MUSIC WEEKEND", noT2:true}, {h:15, p:"MUSIC WEEKEND"}, {h:16, p:"MUSIC WEEKEND"}, {h:17, p:"MUSIC WEEKEND"},

window.onload = function() {
  const hoy = new Date();
  const yyyy = hoy.getFullYear();
  let mm = hoy.getMonth() + 1;
  let dd = hoy.getDate();
  if(dd < 10) dd = '0' + dd;
  if(mm < 10) mm = '0' + mm;
  document.getElementById('fecha-in').value = yyyy + '-' + mm + '-' + dd;
  cargarMateriales();
};

function resetearEstadoPorFecha() {
  document.getElementById('panel-preview').style.display = 'none';
  document.getElementById('status-gen').innerHTML = '';
  document.getElementById('status-nube').innerHTML = '';
  SCHEDULE_PROMOS = null;
  const checks = document.querySelectorAll('#lista-tematicas input[type="checkbox"]');
  checks.forEach(c => c.checked = false);
}

function filtrarIntertandas() {
  const q = document.getElementById('search-intertanda').value.toLowerCase();
  const items = document.querySelectorAll('#lista-tematicas .check-item');
  items.forEach(el => {
    if(el.innerText.toLowerCase().includes(q)) el.style.display = 'flex';
    else el.style.display = 'none';
  });
  document.querySelectorAll('#lista-tematicas .cat-header').forEach(header => {
    let next = header.nextElementSibling;
    let hasVisible = false;
    while(next && next.classList.contains('check-item')){
      if(next.style.display !== 'none'){ hasVisible = true; break; }
      next = next.nextElementSibling;
    }
    header.style.display = hasVisible ? 'block' : 'none';
  });
}

function setStatus(id, msg, type){
  const el = document.getElementById(id);
  if(el) el.innerHTML = `<span class="chip ${type}">${msg}</span>`;
}

function decToTime(h){
  return String(h).padStart(2,'0') + ':00';
}

async function cargarMateriales(){
  const url = 'https://docs.google.com/spreadsheets/d/1r7NzvlZPD7MqYSnYkjoeFM5fv9Boq7AM4ktjKTzp3aE/edit?gid=282563612#gid=282563612';
  setStatus('status-mat', 'Conectando...', 'load');
  let fetchUrl = url;
  const m = url.match(/\/d\/([^\/\?]+)/);
  const gidMatch = url.match(/[?&#]gid=([^&#\s]+)/);
  let gidStr = gidMatch ? `&gid=${gidMatch[1]}` : '';
  if(m) fetchUrl = `https://docs.google.com/spreadsheets/d/${m[1]}/export?format=csv${gidStr}`;
  try {
    const r = await fetch(fetchUrl, {cache:'no-cache'});
    let text = await r.text();
    procesarCSV(text);
  } catch(e) {
    try {
      const r2 = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(fetchUrl)}`);
      const d = await r2.json();
      procesarCSV(d.contents);
    } catch(e2) { setStatus('status-mat', '❌ Error.', 'err'); }
  }
}

function procesarCSV(text){
  if(!text || text.toLowerCase().includes('<html')){ setStatus('status-mat', '❌ Privado o Vacío.', 'err'); return; }
  const lines = text.split('\n');
  MAT_WEB = []; MAT_TEMATICAS = {}; colorMap = {}; 
  for(let i=1; i<lines.length; i++){
    let rawLine = lines[i].replace(/[\r\n]+/g, '').trim();
    if(!rawLine) continue;
    const cols = [];
    let inQuotes = false; let colVal = '';
    for(let j=0; j<rawLine.length; j++){
       let char = rawLine[j];
       if(char === '"' && rawLine[j+1] === '"'){ colVal += '"'; j++; }
       else if(char === '"'){ inQuotes = !inQuotes; }
       else if(char === ',' && !inQuotes){ cols.push(colVal.trim()); colVal = ''; }
       else { colVal += char; }
    }
    cols.push(colVal.trim());
    if(cols.length < 2 || !cols[0]) continue;
    const n = cols[0].toUpperCase();
    const c = cols[1] || '';
    const cat = (cols[2] || 'OTRAS').toUpperCase().trim();
    let tag = (cols[3] || '').toUpperCase().trim();
    if(!tag) tag = n.replace('INTERT LA 100 ', '').replace('SEP LA 100 ', '').trim();
    const item = {n:cols[0], c:c, tag:tag, cat:cat};
    if(n.includes('WEB CORTO') || cat.includes('WEB')){ MAT_WEB.push(item); }
    else if(n.includes('INTERT LA 100') || n.includes('SEP LA 100')){
      if(!MAT_TEMATICAS[tag]) MAT_TEMATICAS[tag] = [];
      MAT_TEMATICAS[tag].push(item);
    }
  }
  setStatus('status-mat', `✅ ${MAT_WEB.length} Rellenos | ${Object.keys(MAT_TEMATICAS).length} Cat.`, 'ok');
  renderTematicas();
}

function renderTematicas(){
  const list = document.getElementById('lista-tematicas');
  if(!list) return;
  list.innerHTML = '';
  let agrupado = {};
  for(let tag in MAT_TEMATICAS){
    let cat = MAT_TEMATICAS[tag][0].cat || 'OTRAS';
    if(!agrupado[cat]) agrupado[cat] = [];
    agrupado[cat].push(tag);
  }
  const cats = Object.keys(agrupado).sort((a,b) => a.localeCompare(b));
  cats.forEach(cat => {
    const header = document.createElement('div');
    header.className = 'cat-header';
    header.style.backgroundColor = getColorForCat(cat);
    header.innerText = cat;
    list.appendChild(header);
    const tags = agrupado[cat].sort((a,b) => a.localeCompare(b));
    tags.forEach((tag, idx) => {
      const div = document.createElement('div');
      div.className = 'check-item';
      let safeId = 'chk-' + cat.replace(/\s+/g, '-') + '-' + idx;
      div.innerHTML = `<input type="checkbox" id="${safeId}" value="${tag}"> <label for="${safeId}"><strong>${tag}</strong> (${MAT_TEMATICAS[tag].length})</label>`;
      list.appendChild(div);
    });
  });
}

async function bajarScheduleNube(){
  const f = document.getElementById('fecha-in').value;
  if(!f){ setStatus('status-nube', 'Fecha.', 'err'); return; }
  setStatus('status-nube', 'Buscando...', 'load');
  try {
    const res = await fetch('https://script.google.com/macros/s/AKfycbxjMjXPutA3qveZUkWfieLqOauUhYcTlfE3MPSMwpGH63brEz8NqGWhWO5PZ7Ah-Qq3HQ/exec');
    const data = await res.json();
    const target = `asignaciones_${f}.json`;
    const found = (data && data.files) ? data.files.find(x => x.name === target) : null;
    if(found){
      const reqFile = await fetch(`https://script.google.com/macros/s/AKfycbxjMjXPutA3qveZUkWfieLqOauUhYcTlfE3MPSMwpGH63brEz8NqGWhWO5PZ7Ah-Qq3HQ/exec?action=getFile&fileName=${target}`);
      SCHEDULE_PROMOS = await reqFile.json();
      setStatus('status-nube', `✅ Antichoques OK.`, 'ok');
    } else { SCHEDULE_PROMOS = null; setStatus('status-nube', `⚠️ No hay schedule.`, 'err'); }
  } catch(e) { SCHEDULE_PROMOS = null; setStatus('status-nube', '❌ Error.', 'err'); }
}

function shuffle(arr){ return arr.sort(() => Math.random() - 0.5); }

function borrarMaterial(e, spanElement) {
  e.stopPropagation(); 
  let td = spanElement.closest('td');
  td.dataset.n = ''; td.dataset.c = ''; td.dataset.cat = '';
  let tanda = td.className.includes('td-t1') ? 1 : 2;
  td.innerHTML = `<div class="empty-slot" onclick="abrirModal(this.parentElement, ${tanda})">+ Agregar</div>`;
}

function renderCelda(m, tdClass) {
  if (!m || !m.n) {
    let tanda = tdClass.includes('td-t1') ? 1 : 2;
    return `<td class="${tdClass}" data-n="" data-c="" data-cat=""><div class="empty-slot" onclick="abrirModal(this.parentElement, ${tanda})">+ Agregar</div></td>`;
  }
  return `<td class="${tdClass}" data-n="${m.n}" data-c="${m.c}" data-cat="${m.cat || ''}">
            <div class="material-chip" style="background-color:${getColorForCat(m.cat || 'OTRAS')}">
              ${m.n}<small>${m.c}</small>
              <span class="delete-btn" onclick="borrarMaterial(event, this)">×</span>
            </div>
          </td>`;
}

function generarPrevisualizacion(){
  const status = document.getElementById('status-gen');
  status.innerHTML = '⏳ Generando...';
  try {
    const fIn = document.getElementById('fecha-in').value;
    if(!fIn || MAT_WEB.length === 0){ status.innerHTML = '❌ Falta fecha o catálogo.'; return; }
    
    // Obtenemos los checks tal cual los tildó el usuario (orden del DOM)
    const seleccionadas = [];
    document.querySelectorAll('input[type="checkbox"]:checked').forEach(c => seleccionadas.push(c.value));
    
    const objFecha = new Date(fIn + 'T12:00:00');
    const diaNum = objFecha.getDay();
    let grilla = GRILLA_LUN_VIE;
    if(diaNum === 6) grilla = GRILLA_SABADO;
    if(diaNum === 0) grilla = GRILLA_DOMINGO;
    const isFinde = (diaNum === 0 || diaNum === 6);
    
    const tbody = document.getElementById('tbody-preview');
    tbody.innerHTML = '';
    
    let usadasWebEnProg = {};
    function getWebAleatorio(prog){
      let arr = MAT_WEB.filter(w => !usadasWebEnProg[prog].includes(w.n));
      if(arr.length === 0){ usadasWebEnProg[prog] = []; arr = [...MAT_WEB]; }
      arr = shuffle(arr); let esc = arr[0]; usadasWebEnProg[prog].push(esc.n); return esc;
    }

    let bagTematicas = {};
    function getAudioForTag(tag) {
       if (!bagTematicas[tag] || bagTematicas[tag].length === 0) {
           if(!MAT_TEMATICAS[tag]) return {n:'MATERIAL NO ENCONTRADO', c:'---', cat:'OTRAS'};
           bagTematicas[tag] = shuffle([...MAT_TEMATICAS[tag]]);
       }
       return bagTematicas[tag].pop();
    }

    let programasData = [];
    let currentP = null;
    grilla.forEach(b => {
        if(!currentP || currentP.p !== b.p) {
            currentP = { p: b.p, blocks: [] };
            programasData.push(currentP);
        }
        let blockClone = {...b, assignedTags: []};
        
        let maxTags = 2; // Dos tandas libres por hora
        if (blockClone.noT2 || blockClone.fixT2) maxTags = 1;
        
        blockClone.maxTags = maxTags;
        currentP.blocks.push(blockClone);
    });

    let tagsObj = seleccionadas.map(tag => {
        let tU = tag.toUpperCase();
        let minH = 0;
        let isProg = false;
        const keywordsProg = ["MORO", "NETD", "TODO DICHO", "SARASA", "ATARDECER", "CASA", "ABIERTO", "WEEKEND", "RETRO"];
        if (keywordsProg.some(k => tU.includes(k))) {
            isProg = true;
        }
        if(isProg) {
            if(isFinde) {
               minH = 13;
            } else {
               if (tU.includes("MORO")) minH = 13; 
               else if (tU.includes("NETD") || tU.includes("TODO DICHO")) minH = 14;
               else if (tU.includes("SARASA")) minH = 17;
               else if (tU.includes("ATARDECER")) minH = 20;
               else minH = 13;
            }
        }
        return {tag, minH, isProg};
    });

    programasData.forEach(prog => {
        usadasWebEnProg[prog.p] = [];
        let availableBlocks = [...prog.blocks];
        
        for(let item of tagsObj) {
            let tag = item.tag;
            let minH = item.minH;

            // Busca todas las opciones válidas
            let validBlocks = availableBlocks.filter(block => {
                if (block.assignedTags.length >= block.maxTags) return false;
                if (block.assignedTags.includes(tag)) return false; 
                if (block.h < minH) return false;
                return true;
            });

            if (validBlocks.length === 0) continue; // No hay lugar en este programa

            // Primero, buscamos bloques que NO choquen con la pauta
            let blocksWithoutHardCollision = validBlocks.filter(block => {
                let blockHour = block.h;
                if (SCHEDULE_PROMOS && Array.isArray(SCHEDULE_PROMOS.asignaciones)) {
                    let promosInHour = SCHEDULE_PROMOS.asignaciones.filter(p => p.hora === blockHour);
                    if (promosInHour.length > 0) {
                        return !promosInHour.some(p => {
                            let pTag = (p.artista || p.tag || '').toUpperCase().trim();
                            let pName = (p.name || p.nombre || p.n || '').toUpperCase().trim();
                            let iTag = tag.toUpperCase().trim();
                            if (pTag && (iTag === pTag || pTag.includes(iTag) || iTag.includes(pTag))) return true;
                            if (pName && (pName.includes(iTag) || pName.includes(pTag))) return true;
                            let words = iTag.split(/\s+/).filter(w => w.length > 3 && !['INTERT','PROMO','CORTO','LA','100'].includes(w));
                            return words.some(w => pName.includes(w) || pTag.includes(w));
                        });
                    }
                }
                return true;
            });

            let viableBlocks = blocksWithoutHardCollision.length > 0 ? blocksWithoutHardCollision : validBlocks;

            // Segundo, intentamos separar las mismas intertandas de horas contiguas globalmente
            let blocksWithoutSoftCollision = viableBlocks.filter(block => {
                let blockHour = block.h;
                let hasAdjacent = false;
                for (let checkP of programasData) {
                    for (let checkB of checkP.blocks) {
                        if (checkB.assignedTags.includes(tag) && Math.abs(checkB.h - blockHour) <= 1) {
                            hasAdjacent = true;
                            break;
                        }
                    }
                    if (hasAdjacent) break;
                }
                return !hasAdjacent;
            });

            let finalBlocks = blocksWithoutSoftCollision.length > 0 ? blocksWithoutSoftCollision : viableBlocks;

            // Asignamos al azar dentro de los mejores bloques posibles
            if (finalBlocks.length > 0) {
                let chosenBlock = finalBlocks[Math.floor(Math.random() * finalBlocks.length)];
                chosenBlock.assignedTags.push(tag);
                if (chosenBlock.assignedTags.length >= chosenBlock.maxTags) {
                    availableBlocks = availableBlocks.filter(b => b !== chosenBlock);
                }
            }
        }

        const trH = document.createElement('tr'); 
        trH.className = 'prog-row';
        trH.innerHTML = `<td colspan="5" style="padding:12px 15px;">${prog.p}</td>`;
        tbody.appendChild(trH);

        prog.blocks.sort((a,b) => a.h - b.h).forEach(bloque => {
            let t1 = null; let t2 = null;
            let hasFix = !isFinde && bloque.fixT2;
            let tagsToPlace = [...bloque.assignedTags];

            if (bloque.noT2) {
                if (tagsToPlace.length > 0) t1 = getAudioForTag(tagsToPlace[0]);
                else t1 = getWebAleatorio(prog.p);
            } else if (hasFix) {
                if (tagsToPlace.length > 0) t1 = getAudioForTag(tagsToPlace[0]);
                else t1 = getWebAleatorio(prog.p);
                t2 = bloque.fixT2;
            } else {
                if (tagsToPlace.length >= 2) {
                    t1 = getAudioForTag(tagsToPlace[0]);
                    t2 = getAudioForTag(tagsToPlace[1]);
                    if (Math.random() > 0.5) { let temp = t1; t1 = t2; t2 = temp; }
                } else if (tagsToPlace.length === 1) {
                    let theTag = getAudioForTag(tagsToPlace[0]);
                    let web = getWebAleatorio(prog.p);
                    if (Math.random() > 0.5) { t1 = theTag; t2 = web; }
                    else { t1 = web; t2 = theTag; }
                } else {
                    t1 = getWebAleatorio(prog.p);
                    t2 = getWebAleatorio(prog.p);
                }
            }

            const tr = document.createElement('tr'); 
            tr.dataset.prog = prog.p; 
            tr.dataset.h = bloque.h;
            tr.innerHTML = `<td style="font-weight:bold;text-align:center;font-size:1.1rem;border-right:2px solid #E2E4F6;">${decToTime(bloque.h)}</td>
              ${renderCelda(t1, 'td-t1')}
              <td style="text-align:center;border-right:2px solid #E2E4F6;"><button class="btn-edit" onclick="abrirModal(this.closest('tr').querySelector('.td-t1'), 1)">🔄</button></td>
              ${renderCelda(t2, 'td-t2')}
              <td style="text-align:center;"><button class="btn-edit" onclick="abrirModal(this.closest('tr').querySelector('.td-t2'), 2)">🔄</button></td>`;
            tbody.appendChild(tr);
        });
    });
    
    document.getElementById('panel-preview').style.display = 'block'; 
    status.innerHTML = '✅ OK.';
  } catch (err) { status.innerHTML = '❌ Error: ' + err.message; }
}

function abrirModal(tdElement, tandaNum) {
  celdaEditando = tdElement;
  document.getElementById('search-modal').value = '';
  
  modalItemsData = [];
  MAT_WEB.forEach(m => modalItemsData.push({ ...m, group: 'RELLENOS WEB' }));
  
  let ag = {}; 
  for(let tag in MAT_TEMATICAS){ 
    MAT_TEMATICAS[tag].forEach(m => { 
      let cat = m.cat || 'OTRAS'; 
      if(!ag[cat]) ag[cat] = []; 
      ag[cat].push(m); 
    }); 
  }
  
  Object.keys(ag).sort((a,b)=>a.localeCompare(b)).forEach(cat => {
     ag[cat].sort((a,b)=>a.n.localeCompare(b.n)).forEach(m => modalItemsData.push({ ...m, group: cat }));
  });

  renderModalList('');
  document.getElementById('modal-reemplazo').style.display = 'flex';
  setTimeout(() => document.getElementById('search-modal').focus(), 100);
}

function cerrarModal() { 
  document.getElementById('modal-reemplazo').style.display = 'none'; 
  celdaEditando = null; 
}

document.addEventListener('keydown', e => {
  if(e.key === 'Escape' && document.getElementById('modal-reemplazo').style.display === 'flex') {
      cerrarModal();
  }
});
document.getElementById('modal-reemplazo').addEventListener('click', function(e) {
  if (e.target === this) cerrarModal();
});

function renderModalList(query) {
  const list = document.getElementById('lista-materiales-modal');
  list.innerHTML = '';
  let q = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

  let groups = {};
  modalItemsData.forEach(m => {
     let nNorm = m.n.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
     let cNorm = m.c.toLowerCase();
     if (nNorm.includes(q) || cNorm.includes(q)) {
        if (!groups[m.group]) groups[m.group] = [];
        groups[m.group].push(m);
     }
  });

  let sortedGroups = Object.keys(groups).sort();
  sortedGroups.forEach(g => {
     let divG = document.createElement('div');
     divG.className = 'mod-cat';
     divG.innerText = g;
     list.appendChild(divG);

     groups[g].forEach(m => {
        let divI = document.createElement('div');
        divI.className = 'mod-item';
        divI.innerHTML = `<span><strong>${m.n}</strong></span> <span style="color:#7478A8; font-size:0.7rem; font-family:'DM Mono', monospace;">${m.c}</span>`;
        divI.onclick = () => aplicarReemplazo(m.n, m.c, m.cat);
        list.appendChild(divI);
     });
  });

  if (sortedGroups.length === 0) {
     list.innerHTML = '<div style="padding:30px; text-align:center; color:#7478A8; font-size:0.9rem;">No se encontraron materiales</div>';
  }
}

function filtrarModal() {
   renderModalList(document.getElementById('search-modal').value);
}

function aplicarReemplazo(n, c, cat) {
  if(!celdaEditando) return;
  celdaEditando.dataset.n = n; 
  celdaEditando.dataset.c = c; 
  celdaEditando.dataset.cat = cat;
  celdaEditando.innerHTML = `<div class="material-chip" style="background-color:${getColorForCat(cat || 'OTRAS')}">${n}<small>${c}</small>
    <span class="delete-btn" onclick="borrarMaterial(event, this)">×</span></div>`;
  cerrarModal();
}

async function exportarDesdeTabla(){
  try {
      const fIn = document.getElementById('fecha-in').value; const objFecha = new Date(fIn + 'T12:00:00');
      const dias = ['DOMINGO','LUNES','MARTES','MIERCOLES','JUEVES','VIERNES','SABADO'];
      const meses = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
      const diaNombre = dias[objFecha.getDay()];
      const mesNombre = meses[objFecha.getMonth()];
      const dNum = String(objFecha.getDate()).padStart(2, '0');
      const yyyy = objFecha.getFullYear();

      const fileName = `INTERTANDAS ${yyyy} ${mesNombre} ${dNum} - ${diaNombre}.xlsx`;

      const wb = new ExcelJS.Workbook(); const ws = wb.addWorksheet('INTERTANDAS', {views: [{showGridLines: false}]});
      ws.columns = [{ width: 10 }, { width: 45 }, { width: 12 }, { width: 3 }, { width: 45 }, { width: 12 }];
      const rowT = ws.addRow([fileName.replace('.xlsx', '')]);
      ws.mergeCells('A1:F1'); rowT.height = 30;
      for(let i=1; i<=6; i++){ let c = rowT.getCell(i); c.font = { name: 'Calibri', size: 16, bold: true, color: { argb: 'FFFFFFFF' } };
          c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1A237E' } }; c.alignment = { vertical: 'middle', horizontal: 'center' }; }
      ws.addRow([]);
      
      const trs = document.querySelectorAll('#tbody-preview tr');
      trs.forEach(tr => {
        if(tr.classList.contains('prog-row')) {
            const progRow = ws.addRow([tr.innerText.trim()]); ws.mergeCells(`A${progRow.number}:F${progRow.number}`);
            for(let i=1; i<=6; i++){ let c = progRow.getCell(i); c.font = { name: 'Calibri', size: 12, bold: true, color: { argb: 'FFFFFFFF' } };
                c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF3949AB' } }; c.alignment = { vertical: 'middle', horizontal: 'center' }; }
            const sub = ws.addRow(['HORA', 'TANDA 1', '', '', 'TANDA 2', '']);
            ws.mergeCells(`B${sub.number}:C${sub.number}`);
            ws.mergeCells(`E${sub.number}:F${sub.number}`);
            for(let i=1; i<=6; i++){ let c = sub.getCell(i); c.font = { name: 'Calibri', size: 10, bold: true, color: { argb: 'FF1A237E' } };
                c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFC5CAE9' } }; 
                if(i !== 4) { c.border = { top: {style:'thin', color:{argb:'FFFFFFFF'}}, bottom: {style:'thin', color:{argb:'FFFFFFFF'}}, left: {style:'thin', color:{argb:'FFFFFFFF'}}, right: {style:'thin', color:{argb:'FFFFFFFF'}} }; } }
            return;
        }
        
        let d1 = tr.querySelector('.td-t1'); let d2 = tr.querySelector('.td-t2');
        let hInt = parseInt(tr.dataset.h);
        
        const dr = ws.addRow([hInt / 24, d1.dataset.n || '', d1.dataset.c || '', '', d2.dataset.n || '', d2.dataset.c || '']);
        dr.height = 32;

        let ch = dr.getCell(1); ch.numFmt = 'hh:mm'; ch.alignment = { horizontal: 'center', vertical: 'middle' };
        ch.font = { name: 'Calibri', size: 12, bold: true, color: { argb: 'FF1B1F6E' } };
        ch.border = { top: {style:'thick', color:{argb:'FFFFFFFF'}}, bottom: {style:'thick', color:{argb:'FFFFFFFF'}}, right: {style:'thin', color:{argb:'FFEEEEEE'}} };

        const formatTanda = (colN, colC, n, cVal) => {
            let cn = dr.getCell(colN);
            let cc = dr.getCell(colC);
            cn.alignment = { vertical: 'middle', horizontal: 'left', wrapText: true, indent: 1 };
            cc.alignment = { vertical: 'middle', horizontal: 'center', wrapText: true };
            
            if (n) {
                cn.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF4F5FF' } };
                cc.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF4F5FF' } };
                cn.font = { name: 'Calibri', size: 11, bold: true, color: { argb: 'FF1B1F6E' } };
                cc.font = { name: 'Calibri', size: 10, bold: false, color: { argb: 'FF7478A8' } };
                
                cn.border = { top: {style:'thick', color:{argb:'FFFFFFFF'}}, bottom: {style:'thick', color:{argb:'FFFFFFFF'}}, left: {style:'medium', color:{argb:'FF4F5EFF'}}, right: {style:'none'} };
                cc.border = { top: {style:'thick', color:{argb:'FFFFFFFF'}}, bottom: {style:'thick', color:{argb:'FFFFFFFF'}}, left: {style:'none'}, right: {style:'thin', color:{argb:'FFDDE2F0'}} };
            } else {
                cn.border = { top: {style:'thick', color:{argb:'FFFFFFFF'}}, bottom: {style:'thick', color:{argb:'FFFFFFFF'}} };
                cc.border = { top: {style:'thick', color:{argb:'FFFFFFFF'}}, bottom: {style:'thick', color:{argb:'FFFFFFFF'}} };
            }
        };

        formatTanda(2, 3, d1.dataset.n, d1.dataset.c);
        formatTanda(5, 6, d2.dataset.n, d2.dataset.c);
      });
      const buffer = await wb.xlsx.writeBuffer();
      const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
      link.download = fileName; link.click();
  } catch (error) { status.innerHTML = '❌ Error: ' + error.message; }
}
