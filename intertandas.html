<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La 100 - Intertandas</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body{font-family:'Sora',sans-serif;background:#F4F6F9;margin:0;padding:20px;color:#333;}
  .container{max-width:1000px;margin:0 auto;background:#fff;padding:30px;border-radius:12px;box-shadow:0 8px 16px rgba(0,0,0,0.05);}
  h1{color:#1B1F6E;margin-top:0;font-size:1.8rem;}
  .panel{background:#FAFBFF;border:1px solid #E2E4F6;padding:20px;border-radius:8px;margin-bottom:20px;}
  label{font-weight:600;display:block;margin-bottom:8px;color:#1B1F6E;}
  input[type="text"], input[type="date"]{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;box-sizing:border-box;margin-bottom:15px;font-family:'Sora',sans-serif;}
  button{background:#1B1F6E;color:#fff;border:none;padding:12px 20px;border-radius:6px;cursor:pointer;font-weight:700;font-family:'Sora',sans-serif;transition:0.3s;}
  button:hover{background:#2a2f96;}
  .btn-orange{background:#FF5722;}
  .btn-orange:hover{background:#e64a19;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .chip{display:inline-block;padding:5px 10px;border-radius:15px;font-size:0.8rem;font-weight:600;margin-bottom:10px;}
  .chip.load{background:#FFF3E0;color:#E65100;}
  .chip.ok{background:#E8F5E9;color:#2E7D32;}
  .chip.err{background:#FFEBEE;color:#C62828;}
  .list-container{max-height:300px;overflow-y:auto;border:1px solid #ccc;border-radius:6px;padding:10px;background:#fff;}
  .check-item{display:flex;align-items:center;padding:8px;border-bottom:1px solid #eee;}
  .check-item:last-child{border-bottom:none;}
  .check-item input{margin-right:10px;width:18px;height:18px;}
</style>
</head>
<body>

<div class="container">
  <h1>📻 Generador de Intertandas</h1>
  
  <div class="grid-2">
    <div class="panel">
      <label>1. Conectar Base de Datos (Google Sheet)</label>
      <input type="text" id="url-in" placeholder="Pegá la URL del Sheet acá...">
      <button onclick="cargarMateriales()">Cargar Materiales</button>
      <div id="status-mat" style="margin-top:10px;"></div>
    </div>
    
    <div class="panel">
      <label>2. Cargar Schedule del Día (Antichoques)</label>
      <input type="date" id="fecha-in">
      <button onclick="bajarScheduleNube()">Buscar en la Nube</button>
      <div id="status-nube" style="margin-top:10px;"></div>
    </div>
  </div>

  <div class="panel">
    <label>3. Seleccionar Intertandas Temáticas a Pautar</label>
    <div class="list-container" id="lista-tematicas">
      <p style="color:#888;font-size:0.9rem;">Cargá los materiales primero para ver la lista...</p>
    </div>
  </div>

  <button class="btn-orange" style="width:100%;font-size:1.1rem;padding:15px;" onclick="generarExcel()">EXPORTAR EXCEL PARA PAUTAS</button>
  <div id="status-export" style="margin-top:15px;text-align:center;font-weight:bold;"></div>
</div>

<script>
let MAT_WEB = [];
let MAT_TEMATICAS = [];
let SCHEDULE_PROMOS = null;

const GRILLA_LUN_VIE = [
  {h:0.0, p:"LA HORA DE LOS LENTOS"}, {h:0.041666666666666664, p:"LA HORA DE LOS LENTOS"},
  {h:0.08333333333333333, p:"TRASNOCHE 100"}, {h:0.125, p:"TRASNOCHE 100"},
  {h:0.16666666666666666, p:"TRASNOCHE 100"}, {h:0.20833333333333334, p:"TRASNOCHE 100"},
  {h:0.25, p:"EL CLUB DEL MORO", vacio:true}, {h:0.2916666666666667, p:"EL CLUB DEL MORO", vacio:true},
  {h:0.3333333333333333, p:"EL CLUB DEL MORO", vacio:true}, {h:0.375, p:"EL CLUB DEL MORO", vacio:true, fixT2:{n:"COMING LA 100 NETD NEW 01", c:"C2102053"}},
  {h:0.4166666666666667, p:"NO ESTÁ TODO DICHO"}, {h:0.4583333333333333, p:"NO ESTÁ TODO DICHO"},
  {h:0.5, p:"NO ESTÁ TODO DICHO"}, {h:0.5416666666666666, p:"NO ESTÁ TODO DICHO", fixT2:{n:"COMING LA 100 SARASA NEW", c:"C2102054"}},
  {h:0.5833333333333334, p:"SARASA"}, {h:0.625, p:"SARASA"},
  {h:0.6666666666666666, p:"SARASA"}, {h:0.7083333333333334, p:"SARASA"}
];

function setStatus(id, msg, type){
  const el = document.getElementById(id);
  el.innerHTML = `<span class="chip ${type}">${msg}</span>`;
}

async function cargarMateriales(){
  const url = document.getElementById('url-in').value.trim();
  if(!url){ setStatus('status-mat', 'Pegá la URL del Sheet', 'err'); return; }
  setStatus('status-mat', 'Conectando...', 'load');
  
  let fetchUrl = url;
  const m = url.match(/\/d\/([^\/\?]+)/);
  if(m) fetchUrl = `https://docs.google.com/spreadsheets/d/${m[1]}/export?format=csv`;
  
  try {
    const r = await fetch(fetchUrl, {cache:'no-cache'});
    let text = await r.text();
    procesarCSV(text);
  } catch(e) {
    try {
      const r2 = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(fetchUrl)}`);
      const d = await r2.json();
      procesarCSV(d.contents);
    } catch(e2) {
      setStatus('status-mat', 'Error de conexión', 'err');
    }
  }
}

function procesarCSV(text){
  const lines = text.split('\n');
  MAT_WEB = [];
  MAT_TEMATICAS = [];
  
  for(let i=1; i<lines.length; i++){
    const cols = lines[i].split(',').map(c => c.trim().replace(/^"|"$/g, ''));
    if(cols.length < 3) continue;
    const item = {n:cols[0], c:cols[1], cat:cols[2] ? cols[2].toUpperCase() : ''};
    
    if(item.n.includes('SEP LA 100 WEB') || item.n.includes('INTERT LA 100 WEB')){
      MAT_WEB.push(item);
    } else if(item.n.includes('INTERT LA 100')) {
      MAT_TEMATICAS.push(item);
    }
  }
  
  setStatus('status-mat', `✅ ${MAT_WEB.length} Webs | ${MAT_TEMATICAS.length} Temáticas`, 'ok');
  renderTematicas();
}

function renderTematicas(){
  const list = document.getElementById('lista-tematicas');
  list.innerHTML = '';
  MAT_TEMATICAS.forEach((m, idx) => {
    const div = document.createElement('div');
    div.className = 'check-item';
    div.innerHTML = `<input type="checkbox" id="chk-${idx}" value="${idx}"> <label for="chk-${idx}" style="margin:0;font-weight:400;">${m.n} (${m.c})</label>`;
    list.appendChild(div);
  });
}

async function bajarScheduleNube(){
  const f = document.getElementById('fecha-in').value;
  if(!f){ setStatus('status-nube', 'Elegí una fecha primero', 'err'); return; }
  setStatus('status-nube', 'Buscando...', 'load');
  
  try {
    const res = await fetch('https://script.google.com/macros/s/AKfycbxjMjXPutA3qveZUkWfieLqOauUhYcTlfE3MPSMwpGH63brEz8NqGWhWO5PZ7Ah-Qq3HQ/exec');
    const data = await res.json();
    const target = `asignaciones_${f}.json`;
    const found = data.files.find(x => x.name === target);
    
    if(found){
      const reqFile = await fetch(`https://script.google.com/macros/s/AKfycbxjMjXPutA3qveZUkWfieLqOauUhYcTlfE3MPSMwpGH63brEz8NqGWhWO5PZ7Ah-Qq3HQ/exec?action=getFile&fileName=${target}`);
      SCHEDULE_PROMOS = await reqFile.json();
      setStatus('status-nube', '✅ Schedule de promos cargado (Antichoques activado)', 'ok');
    } else {
      SCHEDULE_PROMOS = null;
      setStatus('status-nube', '⚠️ No se encontró schedule. Se armará sin antichoques.', 'load');
    }
  } catch(e) {
    SCHEDULE_PROMOS = null;
    setStatus('status-nube', '❌ Error de red', 'err');
  }
}

function shuffle(arr){
  return arr.sort(() => Math.random() - 0.5);
}

function generarExcel(){
  if(MAT_WEB.length === 0){
    document.getElementById('status-export').innerHTML = '❌ Tenés que cargar los materiales primero.';
    return;
  }
  
  const seleccionadas = [];
  const chks = document.querySelectorAll('input[type="checkbox"]:checked');
  chks.forEach(c => seleccionadas.push(MAT_TEMATICAS[c.value]));
  
  const fIn = document.getElementById('fecha-in').value;
  const objFecha = fIn ? new Date(fIn + 'T12:00:00') : new Date();
  const dias = ['DOMINGO','LUNES','MARTES','MIERCOLES','JUEVES','VIERNES','SABADO'];
  const meses = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
  const diaNombre = dias[objFecha.getDay()];
  const isFinde = (diaNombre === 'SABADO' || diaNombre === 'DOMINGO');
  
  let csv = `INTERTANDAS ${diaNombre} ${objFecha.getDate()} DE ${meses[objFecha.getMonth()]} DE ${objFecha.getFullYear()},,,,\r\n,,,,\r\n`;
  
  let lastWeb = null;
  function getWebAleatorio(){
    let arr = shuffle([...MAT_WEB]);
    if(lastWeb && arr[0].c === lastWeb.c && arr.length > 1) arr.reverse();
    lastWeb = arr[0];
    return arr[0];
  }
  
  let currentProg = "";
  
  GRILLA_LUN_VIE.forEach(bloque => {
    if(bloque.p !== currentProg){
      csv += `${bloque.p},,,,\r\nHORA,TANDA 1,,TANDA 2,\r\n`;
      currentProg = bloque.p;
    }
    
    if(bloque.vacio){
      let t2_n = "", t2_c = "";
      if(!isFinde && bloque.fixT2){
        t2_n = bloque.fixT2.n;
        t2_c = bloque.fixT2.c;
      }
      csv += `${bloque.h},,,${t2_n},${t2_c}\r\n`;
      return;
    }
    
    let t1 = getWebAleatorio();
    let t2 = getWebAleatorio();
    
    if(!isFinde && bloque.fixT2){
      t2 = bloque.fixT2;
    } else {
      if(seleccionadas.length > 0 && Math.random() > 0.5){
        let cand = seleccionadas[Math.floor(Math.random() * seleccionadas.length)];
        let choca = false;
        
        if(SCHEDULE_PROMOS && SCHEDULE_PROMOS.asignaciones){
          const proms = SCHEDULE_PROMOS.asignaciones[bloque.h];
          if(proms && proms.some(p => cand.n.toUpperCase().includes(p.tag.toUpperCase()))){
            choca = true;
          }
        }
        if(!choca) t2 = cand;
      }
    }
    
    csv += `${bloque.h},${t1.n},${t1.c} ,${t2.n},${t2.c}\r\n`;
  });
  
  const blob = new Blob(["\uFEFF" + csv], {type: 'text/csv;charset=utf-8;'});
  const link = document.createElement("a");
  const url = URL.createObjectURL(blob);
  link.setAttribute("href", url);
  link.setAttribute("download", `INTERTANDAS_${diaNombre}_${objFecha.getDate()}.csv`);
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  
  document.getElementById('status-export').innerHTML = '✅ ¡Excel descargado con éxito!';
}
</script>
</body>
</html>
