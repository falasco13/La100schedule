<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La 100 - Intertandas</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<style>
  body{font-family:'Sora',sans-serif;background:#F4F6F9;margin:0;padding:20px;color:#333;}
  .container{max-width:1100px;margin:0 auto;background:#fff;padding:30px;border-radius:12px;box-shadow:0 8px 16px rgba(0,0,0,0.05);}
  h1{color:#1B1F6E;margin-top:0;font-size:1.8rem;}
  .panel{background:#FAFBFF;border:1px solid #E2E4F6;padding:20px;border-radius:8px;margin-bottom:20px;}
  label{font-weight:600;display:block;margin-bottom:8px;color:#1B1F6E;}
  input[type="text"], input[type="date"]{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;box-sizing:border-box;margin-bottom:15px;font-family:'Sora',sans-serif;}
  button{background:#1B1F6E;color:#fff;border:none;padding:12px 20px;border-radius:6px;cursor:pointer;font-weight:700;font-family:'Sora',sans-serif;transition:0.3s;}
  button:hover{background:#2a2f96;}
  .btn-orange{background:#FF5722;}
  .btn-orange:hover{background:#e64a19;}
  .btn-green{background:#2E7D32;}
  .btn-green:hover{background:#1B5E20;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .chip{display:inline-block;padding:5px 10px;border-radius:15px;font-size:0.8rem;font-weight:600;margin-bottom:10px;}
  .chip.load{background:#FFF3E0;color:#E65100;}
  .chip.ok{background:#E8F5E9;color:#2E7D32;}
  .chip.err{background:#FFEBEE;color:#C62828;}
  .list-container{max-height:300px;overflow-y:auto;border:1px solid #ccc;border-radius:6px;padding:10px;background:#fff;}
  .check-item{display:flex;align-items:center;padding:8px;border-bottom:1px solid #eee;}
  .check-item:last-child{border-bottom:none;}
  .check-item input{margin-right:10px;width:18px;height:18px;}
  .cat-header{background:#E2E4F6;padding:8px;font-weight:700;color:#1B1F6E;margin-top:10px;border-radius:4px;font-size:0.9rem;}
  
  table{width:100%;border-collapse:collapse;margin-top:20px;font-size:0.85rem;}
  th, td{border:1px solid #E2E4F6;padding:8px;text-align:left;}
  th{background:#1B1F6E;color:#fff;position:sticky;top:0;}
  td[contenteditable="true"]{background:#FFFDE7;cursor:text;transition:0.2s;}
  td[contenteditable="true"]:focus{background:#FFF59D;outline:2px solid #FF5722;}
  .prog-row{background:#E8EAF6;font-weight:bold;color:#1B1F6E;}
  .btn-edit{background:#E2E4F6;color:#1B1F6E;border:none;padding:5px 8px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:bold;}
  .btn-edit:hover{background:#C5CAE9;}
  
  #modal-reemplazo{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;}
  .modal-content{background:#fff;padding:25px;border-radius:12px;width:90%;max-width:500px;box-shadow:0 10px 25px rgba(0,0,0,0.2);}
</style>
</head>
<body>

<div class="container">
  <h1>📻 Generador de Intertandas</h1>
  
  <div class="grid-2">
    <div class="panel">
      <label>1. Catálogo de Drive</label>
      <div id="status-mat" style="margin-top:10px;"></div>
      <button onclick="cargarMateriales()" style="width:100%; margin-top:15px; background:#4CAF50; padding:10px;">🔄 Recargar Catálogo</button>
    </div>
    
    <div class="panel">
      <label>2. Cargar Schedule del Día (Antichoques)</label>
      <input type="date" id="fecha-in">
      <button onclick="bajarScheduleNube()" style="width:100%; margin-top:5px;">Buscar en la Nube</button>
      <div id="status-nube" style="margin-top:10px;"></div>
    </div>
  </div>

  <div class="panel">
    <label>3. Seleccionar Artistas a Pautar (1 vez x Programa)</label>
    <div class="list-container" id="lista-tematicas">
      <p style="color:#888;font-size:0.9rem;">Conectando con Google Drive...</p>
    </div>
  </div>

  <button class="btn-orange" style="width:100%;font-size:1.1rem;padding:15px;" onclick="generarPrevisualizacion()">1️⃣ GENERAR GRILLA PREVIA</button>
  <div id="status-gen" style="margin-top:10px;text-align:center;font-weight:bold;"></div>

  <div id="panel-preview" class="panel" style="display:none; margin-top:30px; border-color:#FF5722;">
    <h2 style="color:#FF5722; margin-top:0;">Revisión Manual</h2>
    <p style="font-size:0.9rem; color:#666;">Hacé click en las celdas amarillas para modificar manualmente, o usá el botón 🔄 para buscar en el catálogo.</p>
    <div style="max-height:500px; overflow-y:auto; border:1px solid #ccc;">
      <table id="tabla-preview">
        <thead>
          <tr>
            <th style="width:80px;">HORA</th>
            <th>TANDA 1</th>
            <th style="width:100px;"></th>
            <th style="width:30px;"></th>
            <th>TANDA 2</th>
            <th style="width:100px;"></th>
            <th style="width:30px;"></th>
          </tr>
        </thead>
        <tbody id="tbody-preview"></tbody>
      </table>
    </div>
    <button class="btn-green" style="width:100%;font-size:1.1rem;padding:15px; margin-top:20px;" onclick="exportarDesdeTabla()">2️⃣ DESCARGAR EXCEL DEFINITIVO</button>
  </div>
</div>

<div id="modal-reemplazo">
  <div class="modal-content">
    <h3 style="margin-top:0;color:#1B1F6E;">Reemplazar Material</h3>
    <select id="select-material" style="width:100%; padding:12px; font-family:'Sora',sans-serif; margin-bottom:20px; border-radius:6px; border:1px solid #ccc;"></select>
    <div style="display:flex; gap:10px;">
      <button onclick="aplicarReemplazo()" style="flex:1; background:#4CAF50;">Aplicar</button>
      <button onclick="cerrarModal()" style="flex:1; background:#C62828;">Cancelar</button>
      <button onclick="vaciarCelda()" style="flex:1; background:#757575;">Vaciar Tanda</button>
    </div>
  </div>
</div>

<script>
let MAT_WEB = [];
let MAT_TEMATICAS = {};
let SCHEDULE_PROMOS = null;

let filaEditando = null;
let tandaEditando = null;

const GRILLA_LUN_VIE = [
  {h:0.0, p:"LA HORA DE LOS LENTOS", noT2:true},
  {h:0.041666666666666664, p:"LA HORA DE LOS LENTOS", noT2:true},
  {h:0.08333333333333333, p:"TRASNOCHE 100", noT2:true},
  {h:0.125, p:"TRASNOCHE 100", noT2:true},
  {h:0.16666666666666666, p:"TRASNOCHE 100", noT2:true},
  {h:0.20833333333333334, p:"TRASNOCHE 100", noT2:true},
  {h:0.25, p:"EL CLUB DEL MORO", vacio:true},
  {h:0.2916666666666667, p:"EL CLUB DEL MORO", vacio:true},
  {h:0.3333333333333333, p:"EL CLUB DEL MORO", vacio:true},
  {h:0.375, p:"EL CLUB DEL MORO", vacio:true, fixT2:{n:"COMING LA 100 NETD NEW 01", c:"C2102053"}},
  {h:0.4166666666666667, p:"NO ESTÁ TODO DICHO"},
  {h:0.4583333333333333, p:"NO ESTÁ TODO DICHO"},
  {h:0.5, p:"NO ESTÁ TODO DICHO"},
  {h:0.5416666666666666, p:"NO ESTÁ TODO DICHO", fixT2:{n:"COMING LA 100 SARASA NEW", c:"C2102054"}},
  {h:0.5833333333333334, p:"SARASA"},
  {h:0.625, p:"SARASA"},
  {h:0.6666666666666666, p:"SARASA"},
  {h:0.7083333333333334, p:"ATARDECER DE UN DIA AGITADO"},
  {h:0.75, p:"ATARDECER DE UN DIA AGITADO"},
  {h:0.7916666666666666, p:"ATARDECER DE UN DIA AGITADO"},
  {h:0.8333333333333334, p:"ROMANTICOS", noT2:true},
  {h:0.875, p:"ROMANTICOS", noT2:true},
  {h:0.9166666666666666, p:"ROMANTICOS", noT2:true},
  {h:0.9583333333333334, p:"ROMANTICOS", noT2:true}
];

window.onload = function() {
  const hoy = new Date();
  const yyyy = hoy.getFullYear();
  let mm = hoy.getMonth() + 1;
  let dd = hoy.getDate();
  if(dd < 10) dd = '0' + dd;
  if(mm < 10) mm = '0' + mm;
  document.getElementById('fecha-in').value = yyyy + '-' + mm + '-' + dd;
  cargarMateriales();
};

function setStatus(id, msg, type){
  const el = document.getElementById(id);
  if(el) el.innerHTML = `<span class="chip ${type}">${msg}</span>`;
}

function decToTime(d){
  let m = Math.round(d * 24 * 60);
  let hh = Math.floor(m / 60);
  let mm = m % 60;
  return String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
}

async function cargarMateriales(){
  const url = 'https://docs.google.com/spreadsheets/d/1r7NzvlZPD7MqYSnYkjoeFM5fv9Boq7AM4ktjKTzp3aE/edit?gid=282563612#gid=282563612';
  setStatus('status-mat', 'Conectando con Drive...', 'load');
  
  let fetchUrl = url;
  const m = url.match(/\/d\/([^\/\?]+)/);
  const gidMatch = url.match(/[?&#]gid=([^&#\s]+)/);
  let gidStr = gidMatch ? `&gid=${gidMatch[1]}` : '';
  
  if(m) fetchUrl = `https://docs.google.com/spreadsheets/d/${m[1]}/export?format=csv${gidStr}`;
  
  try {
    const r = await fetch(fetchUrl, {cache:'no-cache'});
    let text = await r.text();
    procesarCSV(text);
  } catch(e) {
    try {
      const r2 = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(fetchUrl)}`);
      const d = await r2.json();
      procesarCSV(d.contents);
    } catch(e2) {
      setStatus('status-mat', '❌ Error de red.', 'err');
    }
  }
}

function procesarCSV(text){
  if(!text){
    setStatus('status-mat', '❌ Datos vacíos o error de lectura.', 'err');
    return;
  }
  if(text.toLowerCase().includes('<!doctype html>') || text.toLowerCase().includes('<html')){
     setStatus('status-mat', '❌ Tu Sheet es PRIVADO.', 'err');
     return;
  }

  const lines = text.split('\n');
  MAT_WEB = [];
  MAT_TEMATICAS = {};
  
  for(let i=1; i<lines.length; i++){
    let rawLine = lines[i].replace(/[\r\n]+/g, '').trim();
    if(!rawLine) continue;
    
    const cols = [];
    let inQuotes = false;
    let colVal = '';
    for(let j=0; j<rawLine.length; j++){
       let char = rawLine[j];
       if(char === '"' && rawLine[j+1] === '"'){
           colVal += '"';
           j++;
       } else if(char === '"'){
           inQuotes = !inQuotes;
       } else if(char === ',' && !inQuotes){
           cols.push(colVal.trim());
           colVal = '';
       } else {
           colVal += char;
       }
    }
    cols.push(colVal.trim());
    
    if(cols.length < 2 || !cols[0]) continue;
    
    const n = cols[0].toUpperCase();
    const c = cols[1] || '';
    const cat = (cols[2] || 'SIN CATEGORÍA').toUpperCase().trim();
    let tag = (cols[3] || '').toUpperCase().trim();
    
    if(!tag) tag = n.replace('INTERT LA 100 ', '').replace('SEP LA 100 ', '').trim();
    
    const item = {n:cols[0], c:c, tag:tag, cat:cat};
    
    if(n.includes('WEB CORTO') || cat.includes('WEB')){
      MAT_WEB.push(item);
    } else if(n.includes('INTERT LA 100') || n.includes('SEP LA 100')){
      if(!MAT_TEMATICAS[tag]) MAT_TEMATICAS[tag] = [];
      MAT_TEMATICAS[tag].push(item);
    }
  }
  
  const tagsCount = Object.keys(MAT_TEMATICAS).length;
  if(MAT_WEB.length === 0 && tagsCount === 0){
     setStatus('status-mat', '⚠️ Archivo vacío o estructura incorrecta.', 'err');
  } else {
     setStatus('status-mat', `✅ ${MAT_WEB.length} Rellenos | ${tagsCount} Categorías`, 'ok');
  }
  renderTematicas();
}

function renderTematicas(){
  const list = document.getElementById('lista-tematicas');
  if(!list) return;
  list.innerHTML = '';
  
  if(Object.keys(MAT_TEMATICAS).length === 0){
    list.innerHTML = '<p style="color:#888;font-size:0.9rem;">Sin datos.</p>';
    return;
  }
  
  let agrupado = {};
  for(let tag in MAT_TEMATICAS){
    let cat = MAT_TEMATICAS[tag][0].cat || 'OTRAS';
    if(!agrupado[cat]) agrupado[cat] = [];
    agrupado[cat].push(tag);
  }
  
  const categoriasOrdenadas = Object.keys(agrupado).sort((a,b) => a.localeCompare(b));
  
  categoriasOrdenadas.forEach(cat => {
    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerText = cat;
    list.appendChild(header);
    
    const tagsOrdenados = agrupado[cat].sort((a,b) => a.localeCompare(b));
    tagsOrdenados.forEach((tag, idx) => {
      const div = document.createElement('div');
      div.className = 'check-item';
      let safeId = 'chk-' + cat.replace(/\s+/g, '-') + '-' + idx;
      div.innerHTML = `<input type="checkbox" id="${safeId}" value="${tag}"> <label for="${safeId}" style="margin:0;font-weight:400;"><strong>${tag}</strong> (${MAT_TEMATICAS[tag].length})</label>`;
      list.appendChild(div);
    });
  });
}

async function bajarScheduleNube(){
  const f = document.getElementById('fecha-in').value;
  if(!f){ setStatus('status-nube', 'Elegí la fecha primero', 'err'); return; }
  setStatus('status-nube', 'Buscando...', 'load');
  
  try {
    const res = await fetch('https://script.google.com/macros/s/AKfycbxjMjXPutA3qveZUkWfieLqOauUhYcTlfE3MPSMwpGH63brEz8NqGWhWO5PZ7Ah-Qq3HQ/exec');
    const data = await res.json();
    const target = `asignaciones_${f}.json`;
    const found = (data && data.files) ? data.files.find(x => x.name === target) : null;
    
    if(found){
      const reqFile = await fetch(`https://script.google.com/macros/s/AKfycbxjMjXPutA3qveZUkWfieLqOauUhYcTlfE3MPSMwpGH63brEz8NqGWhWO5PZ7Ah-Qq3HQ/exec?action=getFile&fileName=${target}`);
      SCHEDULE_PROMOS = await reqFile.json();
      setStatus('status-nube', `✅ Antichoques activo.`, 'ok');
    } else {
      SCHEDULE_PROMOS = null;
      setStatus('status-nube', `⚠️ Sin schedule previo.`, 'err');
    }
  } catch(e) {
    SCHEDULE_PROMOS = null;
    setStatus('status-nube', '❌ Error de red.', 'err');
  }
}

function shuffle(arr){
  return arr.sort(() => Math.random() - 0.5);
}

function generarPrevisualizacion(){
  const statusGen = document.getElementById('status-gen');
  statusGen.innerHTML = '⏳ Generando grilla...';
  
  try {
    if(MAT_WEB.length === 0){
      statusGen.innerHTML = '❌ Faltan cargar los materiales de relleno (INTERT LA 100 WEB CORTO). Son fundamentales.';
      return;
    }
    
    const fIn = document.getElementById('fecha-in').value;
    if(!fIn){
      statusGen.innerHTML = '❌ Elegí una fecha primero.';
      return;
    }

    const seleccionadas = [];
    document.querySelectorAll('input[type="checkbox"]:checked').forEach(c => seleccionadas.push(c.value));
    
    const objFecha = new Date(fIn + 'T12:00:00');
    const diaNombre = ['DOMINGO','LUNES','MARTES','MIERCOLES','JUEVES','VIERNES','SABADO'][objFecha.getDay()];
    const isFinde = (diaNombre === 'SABADO' || diaNombre === 'DOMINGO');
    
    const tbody = document.getElementById('tbody-preview');
    tbody.innerHTML = '';
    
    let currentProg = "";
    let usadasEnProg = {};
    let usadasWebEnProg = {};
    
    function getWebAleatorio(progName){
      if(MAT_WEB.length === 0) return {n:'', c:''};
      let arr = MAT_WEB.filter(w => !usadasWebEnProg[progName].includes(w.n));
      if(arr.length === 0){
        usadasWebEnProg[progName] = [];
        arr = [...MAT_WEB];
      }
      arr = shuffle(arr);
      let escogido = arr[0];
      usadasWebEnProg[progName].push(escogido.n);
      return escogido;
    }
    
    GRILLA_LUN_VIE.forEach(bloque => {
      if(bloque.p !== currentProg){
        currentProg = bloque.p;
        usadasEnProg[currentProg] = [];
        usadasWebEnProg[currentProg] = [];
        const trH = document.createElement('tr');
        trH.className = 'prog-row';
        trH.innerHTML = `<td colspan="7">${currentProg}</td>`;
        tbody.appendChild(trH);
      }
      
      let t1 = {n:'', c:''};
      let t2 = {n:'', c:''};
      
      if(bloque.vacio){
        if(!isFinde && bloque.fixT2){
          t2 = bloque.fixT2;
        }
      } else {
        let hasFixedT2 = !isFinde && bloque.fixT2;
        let tematicaAsignada = false;
        
        let tagsDisponibles = seleccionadas.filter(tag => !usadasEnProg[currentProg].includes(tag));
        tagsDisponibles = shuffle(tagsDisponibles);
        
        for(let tag of tagsDisponibles){
          let choca = false;
          if(SCHEDULE_PROMOS && SCHEDULE_PROMOS.asignaciones){
            const horaAprox = Object.keys(SCHEDULE_PROMOS.asignaciones).find(k => Math.abs(parseFloat(k) - bloque.h) < 0.0001);
            if(horaAprox){
              const proms = SCHEDULE_PROMOS.asignaciones[horaAprox];
              if(proms && Array.isArray(proms)){
                choca = proms.some(p => {
                   let tagPromo = typeof p === 'string' ? p : (p.tag || p.n || p.nombre || '');
                   tagPromo = tagPromo.toUpperCase().trim();
                   let tagInter = tag.toUpperCase().trim();
                   if(!tagPromo || !tagInter) return false;
                   return tagInter.includes(tagPromo) || tagPromo.includes(tagInter);
                });
              }
            }
          }
          
          if(!choca && MAT_TEMATICAS[tag]){
            let audios = MAT_TEMATICAS[tag];
            let escogido = audios[Math.floor(Math.random() * audios.length)];
            
            if(bloque.noT2){
              t1 = escogido;
            } else if (hasFixedT2) {
              t1 = escogido;
              t2 = bloque.fixT2;
            } else {
              if(Math.random() > 0.5){
                t1 = escogido;
                t2 = getWebAleatorio(currentProg);
              } else {
                t1 = getWebAleatorio(currentProg);
                t2 = escogido;
              }
            }
            usadasEnProg[currentProg].push(tag);
            tematicaAsignada = true;
            break;
          }
        }
        
        if(!tematicaAsignada){
          if(bloque.noT2){
            t1 = getWebAleatorio(currentProg);
          } else if(hasFixedT2){
            t1 = getWebAleatorio(currentProg);
            t2 = bloque.fixT2;
          } else {
            t1 = getWebAleatorio(currentProg);
            t2 = getWebAleatorio(currentProg);
          }
        }
      }
      
      const tr = document.createElement('tr');
      tr.dataset.prog = currentProg;
      tr.dataset.h = bloque.h;
      tr.innerHTML = `
        <td style="font-weight:bold; color:#555;">${decToTime(bloque.h)}</td>
        <td class="t1-n" contenteditable="true">${t1.n || ''}</td>
        <td class="t1-c" contenteditable="true">${t1.c || ''}</td>
        <td style="text-align:center;"><button class="btn-edit" onclick="abrirModal(this.parentElement.parentElement, 1)">🔄</button></td>
        <td class="t2-n" contenteditable="true">${t2.n || ''}</td>
        <td class="t2-c" contenteditable="true">${t2.c || ''}</td>
        <td style="text-align:center;"><button class="btn-edit" onclick="abrirModal(this.parentElement.parentElement, 2)">🔄</button></td>
      `;
      tbody.appendChild(tr);
    });
    
    document.getElementById('panel-preview').style.display = 'block';
    statusGen.innerHTML = '✅ ¡Grilla generada! Revisala abajo.';
    setTimeout(() => {
      document.getElementById('panel-preview').scrollIntoView({behavior: 'smooth'});
    }, 100);

  } catch (err) {
    statusGen.innerHTML = '❌ Fallo interno: ' + err.message;
  }
}

function abrirModal(tr, tandaNum){
  filaEditando = tr;
  tandaEditando = tandaNum;
  
  const select = document.getElementById('select-material');
  select.innerHTML = '<option value="|">-- Seleccionar para reemplazar --</option>';
  
  let gWeb = document.createElement('optgroup');
  gWeb.label = "RELLENOS WEB";
  MAT_WEB.sort((a,b)=>a.n.localeCompare(b.n)).forEach(m => {
     gWeb.innerHTML += `<option value="${m.n}|${m.c}">${m.n}</option>`;
  });
  select.appendChild(gWeb);
  
  let agrupar = {};
  for(let tag in MAT_TEMATICAS){
     MAT_TEMATICAS[tag].forEach(m => {
        let cat = m.cat || 'OTRAS';
        if(!agrupar[cat]) agrupar[cat] = [];
        agrupar[cat].push(m);
     });
  }
  
  Object.keys(agrupar).sort((a,b)=>a.localeCompare(b)).forEach(cat => {
     let g = document.createElement('optgroup');
     g.label = cat;
     agrupar[cat].sort((a,b)=>a.n.localeCompare(b.n)).forEach(m => {
        g.innerHTML += `<option value="${m.n}|${m.c}">${m.n}</option>`;
     });
     select.appendChild(g);
  });

  document.getElementById('modal-reemplazo').style.display = 'flex';
}

function cerrarModal(){
  document.getElementById('modal-reemplazo').style.display = 'none';
}

function aplicarReemplazo(){
  const val = document.getElementById('select-material').value;
  if(val === "|") return;
  const partes = val.split('|');
  const n = partes[0];
  const c = partes[1] || '';
  
  if(tandaEditando === 1){
    filaEditando.querySelector('.t1-n').innerText = n;
    filaEditando.querySelector('.t1-c').innerText = c;
  } else {
    filaEditando.querySelector('.t2-n').innerText = n;
    filaEditando.querySelector('.t2-c').innerText = c;
  }
  cerrarModal();
}

function vaciarCelda(){
  if(tandaEditando === 1){
    filaEditando.querySelector('.t1-n').innerText = '';
    filaEditando.querySelector('.t1-c').innerText = '';
  } else {
    filaEditando.querySelector('.t2-n').innerText = '';
    filaEditando.querySelector('.t2-c').innerText = '';
  }
  cerrarModal();
}

async function exportarDesdeTabla(){
  try {
      const fIn = document.getElementById('fecha-in').value;
      const objFecha = new Date(fIn + 'T12:00:00');
      const dias = ['DOMINGO','LUNES','MARTES','MIERCOLES','JUEVES','VIERNES','SABADO'];
      const meses = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
      const diaNombre = dias[objFecha.getDay()];
      const tituloFecha = `INTERTANDAS ${diaNombre} ${objFecha.getDate()} DE ${meses[objFecha.getMonth()]} DE ${objFecha.getFullYear()}`;

      const wb = new ExcelJS.Workbook();
      const ws = wb.addWorksheet('INTERTANDAS');

      ws.columns = [
        { width: 15 },
        { width: 45 },
        { width: 15 },
        { width: 5 },
        { width: 45 },
        { width: 15 }
      ];

      const rowTitulo = ws.addRow([tituloFecha]);
      ws.mergeCells('A1:F1');
      rowTitulo.font = { name: 'Arial', size: 14, bold: true, color: { argb: 'FF000000' } };
      rowTitulo.alignment = { vertical: 'middle', horizontal: 'center' };
      ws.addRow([]);

      const trs = document.querySelectorAll('#tbody-preview tr');
      
      trs.forEach(tr => {
        if(tr.classList.contains('prog-row')) {
            let currentProg = tr.innerText.trim();
            const progRow = ws.addRow([currentProg]);
            ws.mergeCells(`A${progRow.number}:F${progRow.number}`);
            progRow.font = { name: 'Arial', size: 11, bold: true, color: { argb: 'FFFFFFFF' } };
            progRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1B1F6E' } };
            progRow.alignment = { vertical: 'middle', horizontal: 'center' };

            const subHead = ws.addRow(['HORA', 'TANDA 1', '', '', 'TANDA 2', '']);
            subHead.font = { bold: true };
            subHead.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFE2E4F6' } };
            subHead.eachCell(c => c.border = {
              top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'}
            });
            return;
        }

        let h = parseFloat(tr.dataset.h);
        let t1_n = tr.querySelector('.t1-n').innerText.trim();
        let t1_c = tr.querySelector('.t1-c').innerText.trim();
        let t2_n = tr.querySelector('.t2-n').innerText.trim();
        let t2_c = tr.querySelector('.t2-c').innerText.trim();

        const dataRow = ws.addRow([h, t1_n, t1_c, '', t2_n, t2_c]);
        
        dataRow.getCell(1).numFmt = '0.00000000000000';
        dataRow.getCell(1).alignment = { horizontal: 'left' };
        
        [1, 2, 3, 5, 6].forEach(i => {
            dataRow.getCell(i).border = {
              top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'}
            };
        });
      });

      const buffer = await wb.xlsx.writeBuffer();
      const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `INTERTANDAS_${diaNombre}_${objFecha.getDate()}.xlsx`;
      link.click();
      URL.revokeObjectURL(link.href);

      document.getElementById('status-gen').innerHTML = '✅ ¡Excel descargado con éxito!';
  } catch (error) {
      document.getElementById('status-gen').innerHTML = '❌ Error al exportar: ' + error.message;
  }
}
</script>
</body>
</html>
